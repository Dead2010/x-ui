name: Termius Simple 30-Day

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  simple-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server sshpass curl
          echo "runner:12345678" | sudo chpasswd
          sudo systemctl restart ssh
      
      - name: Install bore
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          ~/.cargo/bin/cargo install bore-cli
      
      - name: Start Tunnel
        run: |
          ~/.cargo/bin/bore local 22 --to bore.pub > bore.log 2>&1 &
          sleep 10
          PORT=$(grep -o ':[0-9]*' bore.log | grep -o '[0-9]*' | tail -1)
          
          echo "========================================="
          echo "📱 TERMIUS CONNECTION DETAILS"
          echo "========================================="
          echo "Host: bore.pub"
          echo "Port: $PORT"
          echo "User: runner"
          echo "Pass: 12345678"
          echo "========================================="
          echo "Add these exact values to Termius"
          echo ""
          echo "⏱️  Tunnel active for 6 hours"
          
          echo "$PORT" > port.txt
          sleep 2160000
      
      - name: Upload Port
        uses: actions/upload-artifact@v4
        with:
          name: termius-port
          path: port.txt
