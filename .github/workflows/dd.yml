name: DigitalOcean VPS Termius Tunnel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  setup-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install Required Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server sshpass curl net-tools
          
      - name: Configure SSH
        run: |
          # Configure SSH for password auth
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          # Set password for runner
          echo "runner:Docean2024!" | sudo chpasswd
          
          # Restart SSH
          sudo systemctl restart ssh
          
      - name: Install Bore Tunnel
        run: |
          # Download bore binary directly (no Rust needed)
          wget -q https://github.com/ekristen/bore/releases/download/v0.5.0/bore-v0.5.0-linux-amd64
          chmod +x bore-v0.5.0-linux-amd64
          sudo mv bore-v0.5.0-linux-amd64 /usr/local/bin/bore
          
      - name: Start Tunnel and Display Info
        run: |
          # Start tunnel in background
          bore local 22 --to bore.pub > tunnel.log 2>&1 &
          
          # Wait for tunnel to establish
          sleep 10
          
          # Extract port number
          PORT=$(grep -o ':[0-9]*' tunnel.log | grep -o '[0-9]*' | head -1)
          
          # Save port to file
          echo $PORT > port.txt
          
          # Display connection info
          echo "========================================="
          echo "📱 TERMIUS CONNECTION DETAILS"
          echo "========================================="
          echo "Host: bore.pub"
          echo "Port: $PORT"
          echo "User: runner"
          echo "Pass: Docean2024!"
          echo "========================================="
          echo "Save these details to connect from Termius"
          echo ""
          echo "⏱️  Tunnel active for 6 hours"
          
          # Keep tunnel alive
          sleep 21600
          
      - name: Upload Port Information
        uses: actions/upload-artifact@v4
        with:
          name: termius-connection
          path: port.txt
          retention-days: 1
