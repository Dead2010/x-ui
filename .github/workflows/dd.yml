name: Termius Simple Tunnel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install SSH and Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server sshpass curl wget net-tools
          echo "runner:simple123" | sudo chpasswd
          sudo systemctl restart ssh
      
      - name: Install Bore via Cargo (Working Method)
        run: |
          # Install Rust and Cargo
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          
          # Install bore-cli
          cargo install bore-cli
          
          # Verify installation
          echo "Bore installed successfully"
      
      - name: Start Tunnel
        run: |
          source "$HOME/.cargo/env"
          
          # Start bore tunnel
          ~/.cargo/bin/bore local 22 --to bore.pub > bore.log 2>&1 &
          
          # Wait for tunnel to establish
          sleep 10
          
          # Extract port number
          PORT=$(grep -o ':[0-9]*' bore.log | grep -o '[0-9]*' | tail -1)
          
          # Display connection info
          echo "========================================="
          echo "📱 TERMIUS CONNECTION DETAILS"
          echo "========================================="
          echo "Host: bore.pub"
          echo "Port: $PORT"
          echo "User: runner"
          echo "Pass: simple123"
          echo "========================================="
          echo "Add these exact values to Termius"
          echo ""
          echo "⏱️  Tunnel active for 6 hours"
          
          # Save port
          echo "$PORT" > port.txt
          
          # Keep tunnel alive
          sleep 21600
      
      - name: Upload Port Info
        uses: actions/upload-artifact@v4
        with:
          name: termius-port
          path: port.txt
